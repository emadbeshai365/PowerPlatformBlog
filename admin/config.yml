backend:
  name: github
  repo: emadbeshai365/PowerPlatformBlog
  branch: main

# Store uploaded images in assets/images/uploads
media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

# Show a live preview of posts while editing
show_preview_links: true

collections:

  # ── Blog Posts ──────────────────────────────────────────
  - name: "posts"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "{{slug}}"
    summary: "{{title}} &mdash; {{date | date('MMM D, YYYY')}}"
    sortable_fields: ["date", "title", "category"]
    fields:
      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "post"

      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Keep under 65 characters for best SEO display"

      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Last Modified"
        name: "last_modified_at"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: false
        hint: "Update this when you revise the post (helps SEO)"

      - label: "Description (meta)"
        name: "description"
        widget: "text"
        hint: "140–160 characters. Shown in search results and OG previews."

      - label: "Topic / Category"
        name: "category"
        widget: "select"
        options:
          - "System Design"
          - "Backend"
          - "Databases"
          - "Cloud & DevOps"
          - "Algorithms"
          - "API Design"

      - label: "Tags"
        name: "tags"
        widget: "list"
        hint: "Additional pill tags shown on cards (e.g. Performance, Security)"
        required: false

      - label: "Read Time"
        name: "read_time"
        widget: "string"
        default: "5 min read"
        hint: "e.g. '8 min read'"

      - label: "Featured Post"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Displays this post in the featured slot on the homepage"

      - label: "Series"
        name: "series"
        widget: "string"
        required: false
        hint: "e.g. 'Scaling Series &middot; Part 1' &mdash; shown as a badge on post cards"

      - label: "Cover / OG Image"
        name: "image"
        widget: "image"
        required: false
        hint: "Used as the Open Graph share image. Ideal: 1200&times;630px"

      - label: "Sidebar Code Filename"
        name: "code_filename"
        widget: "string"
        required: false
        hint: "Filename shown in the sidebar code snippet for this post (e.g. snippet.py)"

      - label: "Sidebar Code Snippet"
        name: "code_snippet"
        widget: "text"
        required: false
        hint: "Short code snippet displayed in the sidebar. Plain text."

      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Full post content in Markdown. Use ## for H2 headings (they appear in the TOC)."

  # ── Static Pages ─────────────────────────────────────────
  - name: "pages"
    label: "Static Pages"
    folder: "_pages"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "page"
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Permalink"
        name: "permalink"
        widget: "string"
        hint: "e.g. /about/"
      - label: "Description"
        name: "description"
        widget: "text"
        required: false
      - label: "Body"
        name: "body"
        widget: "markdown"
